name: joboutput

on:
  workflow_dispatch: 

jobs:
  job1:
    runs-on: ubuntu-latest
    outputs:
      output1: ${{ steps.step2.outputs.files }}
      output2: ${{ steps.step3.outputs.test }}
      output3: ${{ steps.step4.outputs.test }}
    steps:
      - name: code
        uses: actions/checkout@v7
      - id: step2
        run: |
          {
             echo "files<<EOF"
             ls -l
             echo "EOF" 
          }  >> "$GITHUB_OUTPUT"
      - id: step3
        run: echo "test=world" >> "$GITHUB_OUTPUT"
      - id: step4
        run: |
          text=$(date)
          echo "test=$text" >> "$GITHUB_OUTPUT"

  job2:
    runs-on: ubuntu-slim
    needs: job1
    env:
      ro: ${{ needs.job1.outputs.output1 }}
      ar: ${{ needs.job1.outputs.output2 }}
      da: ${{ needs.job1.outputs.output3 }}

    steps:
     - name: print
       run: echo " $ro "
     - name: date
       run: echo "$da"
