name: pr_check
on: 
  workflow_dispatch: 
  pull_request:
    branches: [dev, main]

jobs:
  job1:
    runs-on: ubuntu-latest
    steps:
      - name: code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: pr_check
        id: size_check
        uses: pelotech/github-action-file-size-checker@v0.2.1
        with:
          max_file_size_kib: '50'

  job2:
    runs-on: ubuntu-latest
    steps:
      - name: branch-check
        if: >-
          startsWith(github.head_ref, 'feature/') || 
          startsWith(github.head_ref, 'docs/') || 
          startsWith(github.head_ref, 'fix/')
        run: echo "branch name accurate, move forward with merging "
      - name: status
        if: failure()
        run: echo "branch name not matching create another request"
  job3:
    runs-on: ubuntu-latest
    steps:
      - name: pr_body_check
        continue-on-error: true
        if: github.event.pull_request.body == ''
        run: echo "warning -PR description is empty"
        
        
        

        
