name: pr_check
on: 
  workflow_dispatch: 
  pull_request:
    branches: [dev, main]

jobs:
  job1:
    runs-on: ubuntu-latest
    steps:
      - name: code
        uses: actions/checkout@v7
      - name: pr_check
        id: size_check
        uses: pelotech/github-action-file-size-checker@v0.2.1
        with:
          max_file_size_kib: '50'


        
