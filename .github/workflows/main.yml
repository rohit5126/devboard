name: main
on:
  workflow_dispatch:

jobs:
  code-build:
    runs-on: ubuntu-latest
    steps:
      - name: code-chekcout
        uses: actions/checkout@v7
      - name: install
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: build
        run: |
          cd frontend
          npm install
          npm run build
      - name: upload
        uses: actions/upload-artifact@v4
        with:
          name: main_file
          path: frontend/dist/
        
