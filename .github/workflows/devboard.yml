name: devboard
on:
  push:
    branches: master
    paths: .github/workflows/devboard.yml
jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: code-checkout
        uses: actions/checkout@v7
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: install-npm
        run: npm CI
      - name: run-linter
        run: npm run lint
          
        
